<!-- Dev preview chip — auth / layout / palette toggles.
     Floating, draggable. Include on any page via:
       <div data-include="partials/state-chip.html"></div>
     Drives body[data-auth], body[data-layout], html[data-palette].
     See js/apple-layout.js. -->
<div class="state-chip" role="group" aria-label="Preview options">
    <span class="dev-tag" title="Drag to move · double-click to reset">preview</span>
    <div class="chip-group">
        <span class="label">Auth:</span>
        <div class="pill-group">
            <button type="button" data-auth-set="out">Logged out</button>
            <button type="button" data-auth-set="in" class="active">Logged in</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Layout:</span>
        <div class="pill-group">
            <button type="button" data-layout-set="top" class="active">Top nav</button>
            <button type="button" data-layout-set="side">Sidebar</button>
            <button type="button" data-layout-set="rail">Icon rail</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Data:</span>
        <div class="pill-group">
            <button type="button" data-data-set="full" class="active">Full</button>
            <button type="button" data-data-set="empty">Empty</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Align:</span>
        <div class="pill-group">
            <button type="button" data-align-set="center" class="active">Center</button>
            <button type="button" data-align-set="left">Left</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Sub-nav:</span>
        <div class="pill-group">
            <button type="button" data-subnav-set="on" class="active">Show</button>
            <button type="button" data-subnav-set="off">Hide</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Sub-nav side:</span>
        <div class="pill-group">
            <button type="button" data-subnav-side-set="left">Left</button>
            <button type="button" data-subnav-side-set="right" class="active">Right</button>
            <button type="button" data-subnav-side-set="outside-left" title="Float in the left outer gutter, outside the content column">Outside L</button>
            <button type="button" data-subnav-side-set="outside" title="Float in the right outer gutter, outside the content column">Outside R</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Tiles:</span>
        <div class="pill-group">
            <button type="button" data-tiles-set="all" class="active" title="Show all variants">All</button>
            <button type="button" data-tiles-set="a" title="Variant A — vertical">A</button>
            <button type="button" data-tiles-set="b" title="Variant B — horizontal">B</button>
            <button type="button" data-tiles-set="c" title="Variant C — tinted">C</button>
            <button type="button" data-tiles-set="d" title="Variant D — list">D</button>
            <button type="button" data-tiles-set="f" title="Variant F — list horizontal">F</button>
            <button type="button" data-tiles-set="e" title="Variant E — rings">E</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Form:</span>
        <div class="pill-group">
            <button type="button" data-form-set="all" class="active" title="Show all form variants">All</button>
            <button type="button" data-form-set="a" title="2-col dense grid">A</button>
            <button type="button" data-form-set="b" title="Sectioned cards">B</button>
            <button type="button" data-form-set="c" title="Single column stack">C</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Product:</span>
        <div class="pill-group">
            <button type="button" data-product-set="all" class="active" title="Show both variants">All</button>
            <button type="button" data-product-set="a" title="Left sidebar layout">A</button>
            <button type="button" data-product-set="b" title="Top-tabs layout">B</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Plan:</span>
        <div class="pill-group">
            <button type="button" data-plan-set="all" class="active" title="Show all plan variants">All</button>
            <button type="button" data-plan-set="a" title="Variant A — 3 packages, feature list">A</button>
            <button type="button" data-plan-set="b" title="Variant B — 4 packages, minimal">B</button>
            <button type="button" data-plan-set="c" title="Variant C — 5 packages, horizontal rows">C</button>
            <button type="button" data-plan-set="d" title="Variant D — side-by-side comparison">D</button>
            <button type="button" data-plan-set="e" title="Variant E — bento asymmetric">E</button>
            <button type="button" data-plan-set="f" title="Variant F — segmented bar">F</button>
            <button type="button" data-plan-set="g" title="Variant G — spec matrix">G</button>
            <button type="button" data-plan-set="h" title="Variant H — addon card with radio tiers">H</button>
        </div>
    </div>
    <div class="chip-group">
        <span class="label">Palette:</span>
        <div class="swatch-group" role="group" aria-label="Color palette">
            <button type="button" data-palette="blue"    class="active" title="Apple Blue"></button>
            <button type="button" data-palette="emerald"                title="Emerald"></button>
            <button type="button" data-palette="violet"                 title="Violet"></button>
            <button type="button" data-palette="rose"                   title="Rose"></button>
            <button type="button" data-palette="amber"                  title="Amber"></button>
            <button type="button" data-palette="slate"                  title="Slate"></button>
        </div>
    </div>
</div>
