<!-- Topbar shown on sidebar + rail layouts (hidden on top-nav).
     Breadcrumb "current" cell auto-fills from body[data-page-title]
     via apple-layout.js. Parent page controls the crumb chain by
     overriding the .ph-side-crumbs block after partial loads, or by
     swapping this partial for a page-specific one. -->
<div class="ph-side-topbar only-inner">
    <div class="ph-side-topbar-inner">
        <div class="ph-side-crumbs">
            <a href="portal-home.html">Home</a>
            <span class="sep">›</span>
            <span class="current" aria-current="page" data-current-page>Portal Home</span>
        </div>
        <div class="ph-side-topbar-actions">
            <div class="notification-wrapper only-in" id="sideNotifyWrap">
                <button type="button" class="ph-side-iconbtn" aria-label="Notifications" onclick="togglePortalNotifications(event, 'side')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                    <span class="topbar-notification-dot"></span>
                </button>
                <div class="notification-dropdown" id="notificationDropdownSide">
                    <div class="notification-dropdown-header">
                        <span class="notification-dropdown-title">Notifications</span>
                        <button class="notification-dropdown-clear" type="button">Mark all read</button>
                    </div>
                    <a href="viewinvoice.html" class="notification-item">
                        <div class="notification-dot-indicator orange"></div>
                        <div class="notification-content">
                            <div class="notification-text">Invoice #10247 is due in 2 days</div>
                            <div class="notification-time">2 hours ago</div>
                        </div>
                    </a>
                    <a href="viewticket.html" class="notification-item">
                        <div class="notification-dot-indicator green"></div>
                        <div class="notification-content">
                            <div class="notification-text">Ticket #TKT-4821 has been answered</div>
                            <div class="notification-time">Yesterday</div>
                        </div>
                    </a>
                    <a href="announcements.html" class="notification-item">
                        <div class="notification-dot-indicator blue"></div>
                        <div class="notification-content">
                            <div class="notification-text">Scheduled maintenance on Apr 20</div>
                            <div class="notification-time">3 days ago</div>
                        </div>
                    </a>
                </div>
            </div>
            <a href="cart.html" class="ph-side-iconbtn" aria-label="Cart">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </a>
            <a href="#" onclick="toggleDarkMode(); return false;" class="ph-side-iconbtn" aria-label="Toggle theme">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </a>
            <a href="login.html" class="ph-side-signin only-out">Sign in</a>

            <div class="profile-dropdown-wrapper only-in" id="sideUserWrap">
                <div class="topbar-avatar" onclick="togglePortalProfile(event, 'side')" title="Account">A</div>
                <div class="profile-dropdown" id="profileDropdownSide">
                    <div class="profile-dropdown-header">
                        <div class="profile-dropdown-name">Arshile Gogia</div>
                        <div class="profile-dropdown-email">arshileebay@gmail.com</div>
                    </div>
                    <a href="clientareadetails.html" class="profile-dropdown-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        My Details
                    </a>
                    <a href="clientareasecurity.html" class="profile-dropdown-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        Security Settings
                    </a>
                    <a href="clientareaemails.html" class="profile-dropdown-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        Email History
                    </a>
                    <div class="profile-dropdown-divider"></div>
                    <div class="theme-toggle-row">
                        <span class="theme-toggle-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>Dark Mode</span>
                        <div class="toggle-switch" onclick="toggleDarkMode()"></div>
                    </div>
                    <div class="profile-dropdown-divider"></div>
                    <a href="login.html" class="profile-dropdown-item danger">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Sign Out
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
